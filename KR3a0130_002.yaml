body:
  text: 袁子正論卷下明堂宗廟太學禮之大物也事義不同各有所為而世之論者合以為一體取詩書放逸之文經典相似之語而致之不復考之人情驗之道理失之遠矣夫宗廟之中人所致敬幽隱清靜鬼神所居而使眾學處焉饗射其中人鬼慢黷死生交錯囚俘截耳瘡痍流血以干犯鬼神非其理矣且夫茅茨采椽至質之物建日月乘王輅以處其中象箸玉杯而食於土簋非其類也如禮記先儒之言明堂之制四面東西八丈南北六丈禮天子七廟左昭右穆又有祖宗不在數中以明堂之制言之昭穆安在若又區別非一體也夫宗廟鬼神之居祭天而於人鬼之室非其處也夫明堂法天之宮非鬼神常處故可以祭天而以其祖配之配其父於天位可也事天而就人鬼非其義也自古帝王必立大小之學以教天下有虞氏謂之上庠下庠夏后氏謂之東序西序殷謂之右學左學周謂之東膠虞庠皆以養老乞言明堂位曰瞽宗殷學也周置師保之宮居虎門之側然則學宮非一處也文王世子春夏學干戈秋冬學羽籥皆於東序又曰秋學禮冬學書禮在瞽宗書在上庠此周立三代之學也可謂立其學不可謂立其廟然則太學非宗廟也又曰世子齒於學國人觀之宗廟之中非百姓所觀也王制曰周人養國老於東膠不曰辟廱養國老於右學養庶老於左學宗廟之尊不應與小學為左右也辟廱之制圓之以水圓象天取生長也水潤下取其惠澤也水必有魚鱉取其所以養也是故明堂者大朝諸侯講禮之處宗廟享鬼神歲覲之宮辟廱大射養孤之處大學眾學之居靈臺望氣之觀清廟訓儉之室各有所為非一體也古有王居明堂之禮月令則其事也天子居其中學士處其內君臣同處死生參並非其義也大射之禮天子張三侯大侯九十步其次七十步其次五十步辟廱處其中今未知辟廱廣狹之數但二九十八加之辟廱則徑三百步也凡有公卿大夫諸侯之賓百官侍從之眾殆非宗廟中所能容也禮天子立五門又非一門之間所能受也明堂以祭鬼神故亦謂之廟明堂太廟者明堂之內太室非宗廟之太廟也於辟廱獻捷者謂鬼神惡之也或謂之學者天下之所學也揔謂之宮大同之名也生人不謂之廟此其所以別也先儒曰春秋人君將行告宗廟反獻於廟王制釋奠於學以訊馘告則太學亦廟也其上句曰小學在公宮之左太學在郊明太學非廟非所以為證也周人養庶老於虞庠虞庠在國之西郊今王制亦小學近而太學遠其言乖錯非以為正也潁氏曰公既視朔遂登觀臺以其言遂故謂之同處夫遂者遂事之名不必同處也馬融云明堂在南郊就陽位而宗廟在國外非孝子之情也古文稱明堂陰陽者所以法天道順時政非宗廟之謂也融云告朔行政謂之明堂夫告朔行政上下同也未聞諸侯有明堂之稱也順時行政有國皆然未聞諸侯有居明堂者也齊宣王問孟子人皆謂我毀明堂毀諸已乎孟子曰夫明堂者王者之堂也王欲行王政則勿毀之矣夫宗廟之毀非獨王者也若明堂即宗廟不得曰夫明堂王者之宗廟也且說諸侯而教毀宗廟為人君而疑於可毀與否雖復淺丈夫未有是也孟子古之賢大夫而皆子思弟子去聖不遠此其一證也尸子曰昔武王崩成王少周公踐東宮祀明堂假為天子明堂在左故謂之東宮王者而後有明堂故曰祀明堂假為天子此又其證也詩大雅靈臺孔潁達正義禋者煙氣煙熅也天之體遠不可得就聖人思盡其心而不知所出故因煙氣之上以致其誠故外傳曰精意以享禋此之謂也難者曰禋于文王何也曰夫名有轉相因者周禮云禋祀上帝辨其本言煙熅之禮也書曰禋于文武者取其辨精意以享也先儒云凡絜祀曰禋若絜祀為禋不宜別六宗與山川也凡祭祀無不絜而不可謂皆精然則精意以享宜施燔燎精誠以假煙氣之升以達其誠故也詩大雅生民正義引袁準袁子曰張子布薦亮於孫權亮不肯留人問其故曰孫將軍可謂人主然觀其度能賢亮而不能盡亮吾是以不留蜀志諸葛亮傳裴松之注引袁子或問諸葛亮何如人也袁子曰張飛關羽與劉備俱起爪牙心腹之臣而武人也晚得諸葛亮因以為佐相而群臣悅服劉備足信亮足重故也及其受六尺之孤攝一國之政事凡庸之君專權而不失禮行君事而國人不疑如此即以為君臣百姓之心欣戴之矣行法嚴而國人悅服用民盡其力而下不怨及其兵出入如賓行不寇芻蕘者不獵如在國中其用兵也止如山進退如風兵出之日天下震動而人心不憂亮死至今數十年國人歌思如周人之思召公也孔子曰雍也可使南面諸葛亮有焉又問諸葛始出隴右南安天水安定三郡人反應之若亮速進則三郡非中國之有也而亮徐行不進既而官兵上隴三郡復亮無尺寸之功失此機何也袁子曰蜀兵輕銳良將少亮始出未知國中強弱是以疑而嘗之且大會者不求近功所以不進也曰何以知其疑也袁子曰初出遲重屯營重複後轉降未進兵欲戰亮勇而能鬭三郡反而不速應此其疑徵也曰何以知其勇而能鬭也袁子曰亮之在街亭也前軍大破亮屯去數里不救官兵相接又徐行此其勇也亮之行軍安靜而堅重安靜則易動堅重則可以進退亮法令明賞罰信士卒用命赴險而不顧此所以能鬭也曰亮數萬之眾其所興造若數十萬之功是其奇者也所至營壘井竈圊溷藩籬障塞皆繩墨一月之行去之如始至勞費而徒為飾好何也袁子曰蜀人輕脫亮故堅用之曰何以明其然也袁子曰亮治實而不治名志大而所欲遠非求近速者也曰亮好治官府次舍橋梁道路此非急務何也袁子曰小國賢才少故欲尊嚴也亮之治蜀田疇辟倉廩實器械利蓄積饒朝會不華路無醉人夫本立故末治有餘力而後及小事此所以勸其功也曰子之論諸葛亮則有證也以亮之才而少其功何也袁子曰亮持本者也其於應變則非所長也故不敢用其短曰然則吾子美之何也袁子曰此固賢者之遠矣安可以備體責也夫能知所短而不用此賢者之大也知所短則知所長矣夫前識與言而不中亮之所不用也此吾之所謂奇也蜀志諸亮傳評注引袁子袁子曰諸葛亮重人也而驟用蜀兵此知小國弱民難以久存也今國家一舉而滅蜀自征伐之功未有如此之速者也方鄧艾以萬人入江由之危險鍾會以二十萬眾留劍閣而不得進三軍之士已飢艾雖戰勝克將使劉禪數曰不降則二將之軍難以反矣故功業如此之難也國家前有壽春之役後有滅蜀之勞百姓貧而倉廩虛故小國之慮在於時立功以自存大國之慮在於既勝而力竭成功之後戒懼之時也魏志鄧艾傳注引袁子凡萬物生於天地之間有美有惡物何故美清氣之所生也物何故惡濁氣之所施也夫金石絲竹中天地之氣黼黻元黃應五方之色有五君子以此得曲直者方之性也曲者中鉤者繩輪桷之材也賢不肖者人之性也賢者為師不肖者為資師資之材也然則性言其質才名其用明矣歐陽詢藝文類聚卷二十一引晉袁准才性論天地者帝王所受設祀而敬之虞世南北堂書鈔卷九十公羊高道聽途說之書欲以鄉曲之辯論聖人之經非其任也北堂書鈔卷九十五太平御覽卷六百八國之大祭有五禘祫郊祖宗報此五者禮之大節也徐堅初學記卷十三良醫療病攻於湊理初學記卷二十堯舜之人比屋可封非盡善也猶在防之水非不流也桀紂之人比屋可誅非盡惡也猶在壑之水非不停也太平御覽七十七兵有三勇主愛其民者勇有威刑者勇信賞於民者勇故仁愛加於下則有必死之民太平御覽卷四百三十七封禪之言唯周官有王大封之文齊桓公欲封禪聞管仲言而止焚燎而祭天皆王者之事非諸侯之所為也是以學者疑焉後秦一主漢二君修封禪之事其制為封上方丈餘崇於太山之上皆不見於經秦漢之事未可專信管仲云禹禪會稽告天則同祭地不得異也會稽而可禪四嶽皆可封也夫洛陽者天地之所合嵩高者六合之中也今處天地之中而告于嵩高可也奚必于太山太平御覽卷五百三十六路史前紀卷九羅苹注引禹禪以下末句作不必泰山蒸豚炰鱉烹鶉炙鴈北堂書鈔卷一百四十二遼東細粒寒鵠𧓈鴈河內青稻新城芳稅彫胡細弱㵀梁精美並同上長安九釀中山清酤北堂書鈔卷一百四十六呂布之破也陳群父子時亦在布之軍見太祖皆拜渙獨高揖不為禮太祖甚嚴憚之時太祖又給眾官車各數乘使取布軍中物唯其所欲眾人皆重載唯渙取書數百卷資糧而已眾人聞之大慚渙謂所親曰脫我以行陳令軍發足為行糧而已不以此為我有由是厲名也大悔恨之太祖益以此重焉蜀志袁渙傳注引袁氏世紀渙有四子侃寓奧準侃字公然論議清當柔而不犯善與人交在興廢之間人之所趣務者常謙退不為也時人以是稱之歷位黃門選部郎號為清平稍遷至尚書早卒寓字宣厚精辯有機理好道家之言少被病未官而卒奧字公榮行足以厲俗言約而理當終於光祿勳準字孝尼忠信公正不恥下問唯恐人之不勝已以世事多險故常治退而不敢求進著書十餘萬言論治世之務為易周官詩傳及論五經滯義聖人之微言以傳於世蜀志袁渙傳注引袁氏世紀云此準之自序也師曠曰人骨法猶木有曲直曲者為輪直者為輿檀宜作輻榆宜作轂太平御覽卷九百五十二引正論
