body:
  text: 袁子正論卷上先儒或為同或為異然祫及壇墠禘及郊宗石室此所及近遠之殺也大傳曰禮不王不禘諸侯不禘降於天子也若禘祫同貫此諸侯亦不得祫非徒不禘也杜佑通典卷四十九論者以為五行之官祭於門戶行中霤中霤土神也火正祀竈而水正不祀井非其類也且社奚為於人家之屋棟間哉禮記王七祀諸侯五祀大夫三祀其祀行是記之誤也井不輕於竈行不唯於冬白虎通云月令其祀井是也通典卷五十唯周官有王大封之文按成王封禪而文武皆不在七十二君而無一言見于經傳學者疑焉通典卷五十四自非繼亂不宜改正也通典卷五十五同姓不相娶何也曰遠別也曰今之人外內相婚禮歟曰中外之親近於同姓同姓且猶不可而況中外之親乎古人以為無疑故不制也今以古之不言因謂之可婚此不知禮者也或云國語云同德則同姓同姓雖遠男女不相及異德則異姓異姓雖近男女相及也斯言何故也曰此司空季子明有為而言也文公將求秦於反國不敢逆秦故也季子曰子於子圉道路之人也咎犯曰將奪之國而況妻乎趙衰曰有求於人必先從之此不既了乎通典卷六十魏征東長史吳綱亡入吳妻子留在中國於吳再娶吳亡綱與後妻并子俱還時人以為依典禮不宜有二嫡袁準曰並后匹嫡禮之大忌然此為情愛所偏無故而立之者耳綱夫妻之絶非犯宜出之罪來還則復初焉得而廢之在異域則事勢絶可以娶妻後妻不害焉得而遣之按並后匹嫡事不兩立前嫡承統後嫡不傳重可也二母之服則無疑於兩三年矣通典卷六十八時俗之論曰庶子為公可以尊其母為夫人春秋之義母以子貴按隱公二年夫人子氏薨五年考仲子之宮上稱夫人下應復言仲子明其與妾與妻也秦人來歸成風之穟不稱夫人明其私尊不通於鄰國也左氏傳曰並后匹嫡亂之本也準謂並后如夫人者六是也匹嫡元妃卒立仲子為夫人是也公羊亦云母以子貴説曰穀梁云秦人來歸成風之襚秦不云夫人也就外不云夫人而見正焉夫身為國君而母為妾庶子孫所不忍臣下所不安故私稱於國中不加於境外此人子之情國人之私而立於禮法之正也假有庶子數人並為三公欲各尊其母將何以止之非聖人者無法此大亂之道也通典卷七十二為父後者為出母無服喪者不祭故也其以出不得不降安有母子至親而無服乎釋服而祭可也通典卷八十九繼父制服此則自制父也亂名之大者竊以父猶天也愛敬斯極豈宜靦顏繼以他人哉通典卷九十按禮喪服云為曾祖父母𪗋縗三月自天子至于士一也祖周則曾祖大功高祖小功而云三月者此通遠祖之言也今有彭祖之壽無名之祖存焉爾雅有來孫雲孫仍孫昆孫有相及者故也十世之祖在堂則不可以無服也郯子曰我高祖少皞摯之立也非五代之祖也蒯瞶禱康叔自稱曾孫非四代之曾孫然則高遠也無名之祖希及之矣故不復分別而重言之也故三月以著遠祖之服故𪗋縗以見高祖以上之服遠祖尊故以重服服之恩殺故減其月數故舉三月則知其遠祖稱曾高其服同也儒者或以高祖無服五屬之文而云無服乎族祖族父緦麻而曾祖三月乎通典卷九十或人云嫂親者也長嫂少弟有生長之恩而云無服者近非古也殆秦燔詩書之所失也通典卷九十二從母小功五月舅緦麻三月禮非也從母緦時俗所謂姨母者也舅之與姨俱母之姊妹兄弟焉得異服從母者從其母而為庶母者也親益重故小功也凡稱父母者皆同乎父母之例者也舅非父列姨非母列故舅不稱父姨不稱母也可稱姨不應稱母謂姨母為從母者此時俗之亂名者之所由誤也春秋傳蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而享之爾雅曰妻之姊妹同出為姨此本名者也左傳臧宣叔娶于鑄生賈及為而卒繼室以具姪穆薑之姨子也以蔡侯爾雅言之穆薑焉得言姨此緣妻姊妹之姨因相謂姨也姊妹相謂為姨故其子謂之姨子其母謂之姨母從其母而來故謂之從母從母姨為親一也因復謂之從母此因假轉亂而遂為名者也左傳又宋景曹卒季康子使冉有弔且會葬曰以肥之得備彌甥先儒曰彌遠也姊妹之孫為彌甥此臨事説事而遂可為名乎亦猶從母辭相假也通典卷九十二喪無再服然哀甚不可無服若終月數是再服也道遠則過之可也道近旬月可也或問何親服緦大功以上可也通典卷一百二先儒以為再祭小祥大祥也而喪者已祥則除大祥不應服禫且虞在既葬不在日月禫在喪中不在早晚故宜禫不宜祥通典卷一百三周禮太祝祔練祥掌國事若無縗服焉得祥孔子曰三年之喪天下之通喪也禮記曰父母之喪無貴賤一也又曰公之喪大夫俟練士卒哭而歸此終喪縗麻之言也春秋傳曰三年之喪雖貴遂服禮也言雖貴不得與賤者有異也言服而不言喪縗麻可知也凡春秋傳諸稱除喪皆因時宜耳高宗信默何以知是心喪通典卷八十引袁準以前後所引例之當屬正論文保母者當為保姆春秋宋伯姬待姆是也非母之名也母者因父得稱且保傅婦人輔相婢之貴者耳而為之服不亦重乎先儒欲使公之庶子為母無服而服乳母乎此時俗之名記者集以為禮非聖人之制通典卷九十二引袁準
